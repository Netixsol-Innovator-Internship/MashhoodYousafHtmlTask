<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cristian Munoz - Product Designer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            'sans': ['Inter', 'system-ui', 'sans-serif'],
          },
          colors: {
            dark: {
              bg: '#000000',
              text: '#FFFFFF',
              secondary: '#1F1F1F',
            },
            light: {
              bg: '#FFFFFF',
              text: '#000000',
              secondary: '#F5F5F5',
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
</head>

<body
  class="bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text min-h-screen transition-colors duration-300">
  <!-- Header -->
  <header class="flex items-center justify-between px-6 md:px-12 py-6">
    <!-- Logo -->
    <div class="flex items-center space-x-2">
      <img src="./images/Logo.png" alt="Logo" class="h-8 transform transition-all duration-300 dark:filter dark:grayscale dark:invert dark:brightness-0 ">
    </div>

    <!-- Navigation -->
    <nav class="hidden md:flex items-center space-x-8">
      <a href="#"
        class="text-sm font-medium hover:opacity-70 transition-opacity text-light-text dark:text-dark-text">Home</a>
      <a href="#"
        class="text-sm font-medium hover:opacity-70 transition-opacity text-light-text dark:text-dark-text">Portfolio</a>
      <a href="#"
        class="text-sm font-medium hover:opacity-70 transition-opacity text-light-text dark:text-dark-text">Skills</a>
      <a href="#"
        class="text-sm font-medium hover:opacity-70 transition-opacity text-light-text dark:text-dark-text">About Me</a>
    </nav>

    <!-- Toggle and Contact -->
    <div class="flex items-center space-x-4">
      <!-- Dark/Light Mode Toggle -->
      <button id="theme-toggle"
        class="relative w-12 h-6 bg-[rgba(255,236,112,1)] rounded-full transition-colors duration-300">
        <div id="toggle-circle"
          class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full transition-transform duration-300 transform translate-x-0 dark:translate-x-6">
        </div>
        <img src="./images/Circle.png" alt="Sun"
          class="absolute top-0.5 left-0.5 w-5 h-5 opacity-100 transition-opacity duration-300 transform translate-x-0 dark:opacity-0 z-10">
        <img src="./images/moon.png" alt="Moon"
          class="absolute top-0.5 right-0.5 w-5 h-5 opacity-0 transition-opacity duration-300 transform translate-x-0 dark:opacity-100 z-20">
      </button>

      <!-- Contact Button -->
      <button
        class="bg-[rgba(146,95,240,1)] hover:bg-purple-700 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors">
        Contact Me
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex flex-col lg:flex-row items-center justify-between px-6 md:px-12 py-12 lg:py-24">
    <!-- Left Content -->
    <div class="flex-1 max-w-2xl">
      <!-- Main Title -->
      <div class="mb-8 font-[Anton]">
        <h1
          class="font-[Anton] font-normal text-[140px] leading-[90%] tracking-[-0.03em] text-light-text dark:text-dark-text">
          PRODUCT
        </h1>
        <h1
          class="font-[Anton] font-normal text-[140px] leading-[90%] tracking-[-0.03em] text-light-text dark:text-dark-text">
          DESIGNER
        </h1>

        <!-- Name with Gradient -->
        <h1
          class="text-6xl font-extrabold bg-clip-text text-transparent mt-4 bg-gradient-to-r from-pink-400 via-[rgba(254,225,64,1)] to-yellow-500">
          CRISTIAN MUNOZ
        </h1>
      </div>

      <!-- Social Icons -->
      <div class="flex items-center space-x-6 mb-8">
        <!-- Instagram -->
        <a href="#"
          class="w-10 h-10 border-2 border-light-text dark:border-dark-text rounded-lg flex items-center justify-center transition-colors hover:opacity-70">
          <img src="./images/Instagram.png" alt="Instagram" class="transition-opacity">
        </a>

        <!-- Figma -->
        <a href="#"
          class="w-10 h-10 border-2 border-light-text dark:border-dark-text rounded-lg flex items-center justify-center transition-colors hover:opacity-70">
          <img class="w-6 transition-opacity" src="./images/Figma.png" alt="Figma">
        </a>

        <!-- LinkedIn -->
        <a href="#"
          class="w-10 h-10 border-2 border-light-text dark:border-dark-text rounded-lg flex items-center justify-center transition-colors hover:opacity-70">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
          </svg>
        </a>

        <!-- Twitter -->
        <a href="#"
          class="w-10 h-10 border-2 border-light-text dark:border-dark-text rounded-lg flex items-center justify-center transition-colors hover:opacity-70">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z" />
          </svg>
        </a>

        <!-- Telegram -->
        <a href="#"
          class="w-10 h-10 border-2 border-light-text dark:border-dark-text rounded-lg flex items-center justify-center transition-colors hover:opacity-70">
          <img class="w-6 transition-opacity" src="./images/send.png" alt="Telegram">
        </a>

        <!-- Medium -->
        <a href="#"
          class="w-10 h-10 border-2 border-light-text dark:border-dark-text rounded-lg flex items-center justify-center transition-colors hover:opacity-70">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M13.54 12a6.8 6.8 0 01-6.77 6.82A6.8 6.8 0 010 12a6.8 6.8 0 016.77-6.82A6.8 6.8 0 0113.54 12zM20.96 12c0 3.54-1.51 6.42-3.38 6.42-1.87 0-3.39-2.88-3.39-6.42s1.52-6.42 3.39-6.42 3.38 2.88 3.38 6.42M24 12c0 3.17-.53 5.75-1.19 5.75-.66 0-1.19-2.58-1.19-5.75s.53-5.75 1.19-5.75C23.47 6.25 24 8.83 24 12z" />
          </svg>
        </a>
      </div>

      <!-- Download CV Button -->
      <button
        class="bg-light-secondary dark:bg-dark-secondary hover:bg-gray-300 dark:hover:bg-gray-700 text-light-text dark:text-dark-text px-8 py-3 rounded-lg flex items-center space-x-2 transition-colors">
        <span class="text-sm font-medium">Download Curriculum Vitae</span>
        <img src="./images/arrow-circle-right.png" alt="Download">
      </button>
    </div>

    <!-- Right Content - Artistic Image -->
    <div class="flex-1 max-w-lg mt-12 lg:mt-0 relative">
      <!-- Portal Image (Star) -->
      <img src="./images/Portal.png" alt="Portal" class="absolute top-7 right-[530px] w-20 lg:w-32 transform transition-all duration-300 dark:filter dark:grayscale dark:invert dark:brightness-0">

      <!-- Artistic Image -->
      <div class="relative">
        <img src="./images/0811cd459536d0218cd508dae830bdbf1659db75.jpg"
          class="w-full h-[520px] object-cover rounded-lg" alt="Cristian Munoz">
      </div>
    </div>
  </main>

  <script>
    // Theme toggle functionality
    const themeToggle = document.getElementById('theme-toggle');
    const toggleCircle = document.getElementById('toggle-circle');
    const html = document.documentElement;

    // Initialize theme
    const currentTheme = localStorage.getItem('theme') || 'dark';
    html.classList.toggle('dark', currentTheme === 'dark');
    updateTogglePosition();

    themeToggle.addEventListener('click', () => {
      html.classList.toggle('dark');
      const isDark = html.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      updateTogglePosition();
    });

    function updateTogglePosition() {
      const isDark = html.classList.contains('dark');
      if (isDark) {
        toggleCircle.classList.add('translate-x-6');
        toggleCircle.classList.remove('translate-x-0');
      } else {
        toggleCircle.classList.add('translate-x-0');
        toggleCircle.classList.remove('translate-x-6');
      }
    }
  </script>
</body>

</html>
